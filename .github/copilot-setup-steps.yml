steps:
  - name: Install uv
    uses: astral-sh/setup-uv@v4
  - name: Install Python
    run: uv python install
  - name: Install project deps
    run: uv sync --dev
  - name: Install ruff globally
    run: uv tool install ruff
  - name: Install pip-audit globally
    run: uv tool install pip-audit
